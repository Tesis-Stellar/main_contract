version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tuticket-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tuticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tuticket-api
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/tuticket?schema=public
      JWT_SECRET: super-secret-jwt-key
      JWT_EXPIRES_IN: 7d
      SEAT_HOLD_MINUTES: 10
      SWAGGER_PATH: api/docs
    ports:
      - '3000:3000'

volumes:
  postgres_data:
